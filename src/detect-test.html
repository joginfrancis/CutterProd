<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A4 / Page Detection Test (GrabCut)</title>
<style>
  body { font-family: system-ui, sans-serif; background:#111; color:#eee; margin:0; padding:1rem; }
  h1 { font-size:1.1rem; }
  .row { display:flex; gap:1rem; flex-wrap:wrap; align-items:flex-start; }
  canvas { background:#000; max-width:100%; border:1px solid #333; border-radius:6px; }
  #out { font-family:monospace; font-size:0.8rem; white-space:pre; color:#9ae6b4; }
  label.btn { display:inline-block; background:#3b82f6; color:#fff; padding:0.5rem 1rem; border-radius:6px; cursor:pointer; }
  button { background:#374151; color:#eee; border:none; padding:0.5rem 1rem; border-radius:6px; cursor:pointer; }
  input[type=file]{display:none;}
  .controls{margin:0.75rem 0; display:flex; gap:1rem; align-items:center; flex-wrap:wrap;}
  #status{color:#fbbf24;}
</style>
</head>
<body>
  <h1>A4 / Page Detection Test — GrabCut + geometric validation</h1>
  <div class="controls">
    <label class="btn">Load photo<input type="file" id="file" accept="image/*"></label>
    <button id="runAll">Run all test_images</button>
    <label><input type="checkbox" id="showMask"> show mask</label>
    <span id="status">loading vision engine…</span>
  </div>
  <div class="row">
    <canvas id="cv"></canvas>
    <div id="out"></div>
  </div>

<script src="https://docs.opencv.org/4.x/opencv.js" async></script>
<script>
const PROC = 320;                 // detection working width
const MIN_AREA = 0.15;            // page must be >= this fraction of the frame
const ANGLE_MIN = 60, ANGLE_MAX = 120;   // each corner must be ~90°
const ASPECT_MIN = 1.0, ASPECT_MAX = 2.3; // long/short side ratio sanity
let cvReady = false;

function setStatus(t, c){ const s=document.getElementById('status'); s.textContent=t; s.style.color=c||'#fbbf24'; }
function whenCv(cb){ if(cvReady) return cb(); const id=setInterval(()=>{ if(window.cv&&window.cv.Mat){ clearInterval(id); cvReady=true; setStatus('vision engine ready','#10b981'); cb(); } },200); }
window.addEventListener('load',()=>{ if(window.cv){ window.cv.onRuntimeInitialized=()=>{cvReady=true;setStatus('vision engine ready','#10b981');}; } });

const fileEl=document.getElementById('file'), showMask=document.getElementById('showMask'), cvEl=document.getElementById('cv'), out=document.getElementById('out');
fileEl.onchange=e=>{ const f=e.target.files[0]; if(!f) return; const img=new Image(); img.onload=()=>whenCv(()=>runOne(img)); img.src=URL.createObjectURL(f); };
document.getElementById('runAll').onclick=()=>whenCv(runAll);

function order(q){ q=q.slice(); q.sort((a,b)=>(a[0]+a[1])-(b[0]+b[1])); const tl=q[0],br=q[3]; const rem=[q[1],q[2]]; rem.sort((a,b)=>(a[0]-a[1])-(b[0]-b[1])); return [tl,rem[1],br,rem[0]]; }
function angleAt(p,a,b){ const v1=[a[0]-p[0],a[1]-p[1]], v2=[b[0]-p[0],b[1]-p[1]]; const d=v1[0]*v2[0]+v1[1]*v2[1]; const m=Math.hypot(...v1)*Math.hypot(...v2)||1; return Math.acos(Math.max(-1,Math.min(1,d/m)))*180/Math.PI; }

// Fit a line to points via PCA → {p:centroid, d:unit direction}
function fitLine(pts){ let cx=0,cy=0; pts.forEach(p=>{cx+=p[0];cy+=p[1];}); cx/=pts.length; cy/=pts.length;
  let sxx=0,sxy=0,syy=0; pts.forEach(p=>{const dx=p[0]-cx,dy=p[1]-cy; sxx+=dx*dx; sxy+=dx*dy; syy+=dy*dy;});
  const th=0.5*Math.atan2(2*sxy, sxx-syy); return {p:[cx,cy], d:[Math.cos(th),Math.sin(th)]}; }
function lineIntersect(l1,l2){ const [x1,y1]=l1.p,[dx1,dy1]=l1.d,[x2,y2]=l2.p,[dx2,dy2]=l2.d;
  const det=-dx1*dy2+dx2*dy1; if(Math.abs(det)<1e-6) return null;
  const t=((x2-x1)*(-dy2)-(-dx2)*(y2-y1))/det; return [x1+t*dx1, y1+t*dy1]; }

// Refine rough quad corners by fitting the 4 edges of the contour and intersecting them.
function refineCorners(P, rough){
  if(P.length<24) return null;
  const M=P.length;
  const idx=rough.map(rc=>{ let bi=0,bd=Infinity; for(let i=0;i<M;i++){const dx=P[i][0]-rc[0],dy=P[i][1]-rc[1];const d=dx*dx+dy*dy; if(d<bd){bd=d;bi=i;}} return bi; });
  const ord=[0,1,2,3].sort((a,b)=>idx[a]-idx[b]);
  const sIdx=ord.map(k=>idx[k]);
  const lines=[];
  for(let m=0;m<4;m++){ const a=sIdx[m], b=sIdx[(m+1)%4]; const pts=[]; let i=a;
    while(true){ pts.push(P[i]); if(i===b) break; i=(i+1)%M; if(pts.length>M) break; }
    const t=Math.floor(pts.length*0.18); const mid = pts.length>2*t+4 ? pts.slice(t,pts.length-t) : pts;
    if(mid.length<2) return null; lines.push(fitLine(mid)); }
  const refined=[]; for(let m=0;m<4;m++){ const ip=lineIntersect(lines[(m+3)%4], lines[m]); if(!ip) return null; refined.push(ip); }
  return order(refined);
}

// GrabCut → mask → largest contour → 4-corner hull → validate
function detect(img){
  const cv=window.cv;
  const w=PROC, h=Math.round(PROC*img.naturalHeight/img.naturalWidth);
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  c.getContext('2d',{willReadFrequently:true}).drawImage(img,0,0,w,h);
  let src=cv.imread(c), rgb=new cv.Mat(); cv.cvtColor(src,rgb,cv.COLOR_RGBA2RGB);
  let mask=new cv.Mat(), bgd=new cv.Mat(), fgd=new cv.Mat();
  cv.grabCut(rgb,mask,new cv.Rect(Math.round(w*0.1),Math.round(h*0.1),Math.round(w*0.8),Math.round(h*0.8)),bgd,fgd,5,cv.GC_INIT_WITH_RECT);
  let bin=new cv.Mat(mask.rows,mask.cols,cv.CV_8UC1);
  for(let i=0;i<mask.rows*mask.cols;i++){ const v=mask.data[i]; bin.data[i]=(v===cv.GC_FGD||v===cv.GC_PR_FGD)?255:0; }
  cv.medianBlur(bin,bin,5);
  let cnts=new cv.MatVector(), hi=new cv.Mat();
  cv.findContours(bin,cnts,hi,cv.RETR_EXTERNAL,cv.CHAIN_APPROX_NONE);
  let big=null,bigA=0; for(let i=0;i<cnts.size();i++){ const cc=cnts.get(i); const a=cv.contourArea(cc); if(a>bigA){bigA=a;if(big)big.delete();big=cc;} else cc.delete(); }
  const frameA=w*h; let quad=null, reasons=[], how='none', metrics={};
  if(big){
    // rough 4 corners from the convex hull
    let hull=new cv.Mat(); cv.convexHull(big,hull,false,true);
    const peri=cv.arcLength(hull,true); let approx=new cv.Mat();
    for(let k=0.01;k<=0.10;k+=0.005){ cv.approxPolyDP(hull,approx,k*peri,true); if(approx.rows<=4) break; }
    let rough=null;
    if(approx.rows===4){ rough=[]; for(let i=0;i<4;i++) rough.push([approx.data32S[i*2],approx.data32S[i*2+1]]); how='hull4'; }
    else { const rot=cv.minAreaRect(big); const pts=cv.RotatedRect.points(rot); rough=pts.map(p=>[p.x,p.y]); how='minRect('+approx.rows+')'; }
    hull.delete(); approx.delete();
    // refine: fit lines to the 4 contour edges and intersect them
    const P=[]; for(let i=0;i<big.data32S.length;i+=2) P.push([big.data32S[i],big.data32S[i+1]]);
    const refined=refineCorners(P, rough);
    quad = refined || order(rough);
    how = refined ? how+'+edgefit' : how;
    big.delete();
  }
  let valid=false;
  if(quad){
    // area
    let a=0; for(let i=0;i<4;i++){ const p1=quad[i],p2=quad[(i+1)%4]; a+=p1[0]*p2[1]-p2[0]*p1[1]; } const areaFrac=Math.abs(a)/2/frameA;
    // angles
    const ang=[ angleAt(quad[0],quad[3],quad[1]), angleAt(quad[1],quad[0],quad[2]), angleAt(quad[2],quad[1],quad[3]), angleAt(quad[3],quad[2],quad[0]) ];
    // aspect
    const wTop=Math.hypot(quad[1][0]-quad[0][0],quad[1][1]-quad[0][1]), wBot=Math.hypot(quad[2][0]-quad[3][0],quad[2][1]-quad[3][1]);
    const hL=Math.hypot(quad[3][0]-quad[0][0],quad[3][1]-quad[0][1]), hR=Math.hypot(quad[2][0]-quad[1][0],quad[2][1]-quad[1][1]);
    const ww=(wTop+wBot)/2, hh=(hL+hR)/2, aspect=Math.max(ww,hh)/Math.max(1,Math.min(ww,hh));
    metrics={ areaFrac:+areaFrac.toFixed(3), angles:ang.map(a=>Math.round(a)), aspect:+aspect.toFixed(2) };
    if(areaFrac < MIN_AREA) reasons.push('too small ('+(areaFrac*100|0)+'%)');
    if(ang.some(a=>a<ANGLE_MIN||a>ANGLE_MAX)) reasons.push('bad corner angle');
    if(aspect<ASPECT_MIN||aspect>ASPECT_MAX) reasons.push('bad aspect '+aspect.toFixed(2));
    valid = reasons.length===0;
  } else reasons.push('no region');
  let maskImg=null;
  if(showMask.checked){ maskImg=new ImageData(w,h); for(let i=0;i<w*h;i++){ const v=bin.data[i]; maskImg.data[i*4]=maskImg.data[i*4+1]=maskImg.data[i*4+2]=v; maskImg.data[i*4+3]=255; } }
  [src,rgb,mask,bgd,fgd,bin,hi].forEach(m=>m.delete()); cnts.delete();
  return { w,h,quad,valid,reasons,how,metrics,maskImg,img };
}

function drawResult(ctx,r,ox,oy,scale){
  if(r.maskImg){ const tmp=document.createElement('canvas'); tmp.width=r.w; tmp.height=r.h; tmp.getContext('2d').putImageData(r.maskImg,0,0); ctx.drawImage(tmp,ox,oy,r.w*scale,r.h*scale); }
  else ctx.drawImage(r.img,ox,oy,r.w*scale,r.h*scale);
  if(r.quad){
    const col=r.valid?'#22c55e':'#ef4444';
    ctx.lineWidth=2; ctx.strokeStyle=col; ctx.fillStyle=r.valid?'rgba(34,197,94,0.14)':'rgba(239,68,68,0.12)';
    ctx.beginPath(); ctx.moveTo(ox+r.quad[0][0]*scale,oy+r.quad[0][1]*scale); for(let i=1;i<4;i++)ctx.lineTo(ox+r.quad[i][0]*scale,oy+r.quad[i][1]*scale); ctx.closePath(); ctx.fill(); ctx.stroke();
    r.quad.forEach(p=>{ ctx.beginPath(); ctx.arc(ox+p[0]*scale,oy+p[1]*scale,4,0,6.283); ctx.fillStyle='#fde047'; ctx.fill(); });
  }
}

function runOne(img){
  setStatus('detecting…');
  const r=detect(img); const scale=Math.min(1, 480/r.w);
  cvEl.width=r.w*scale; cvEl.height=r.h*scale; const ctx=cvEl.getContext('2d');
  drawResult(ctx,r,0,0,scale);
  out.textContent=JSON.stringify({ valid:r.valid, method:r.how, ...r.metrics, reasons:r.reasons,
    quad:r.quad?r.quad.map(p=>[Math.round(p[0]),Math.round(p[1])]):null },null,2);
  setStatus(r.valid?'✓ page detected':'✗ rejected: '+r.reasons.join(', '), r.valid?'#10b981':'#ef4444');
}

async function runAll(){
  setStatus('running test_images…');
  const names=['test1.jpg','test2.jpg','test3.jpg','test4.jpg']; const res=[];
  for(const n of names){ const img=await new Promise(r=>{const i=new Image();i.onload=()=>r(i);i.src='/test_images/'+n+'?'+Date.now();}); res.push({n,...detect(img)}); }
  const cellW=220,pad=8,mh=Math.max(...res.map(r=>Math.round(cellW*r.h/r.w)));
  cvEl.width=cellW*2+pad*3; cvEl.height=(mh+22)*2+pad*3; const ctx=cvEl.getContext('2d'); ctx.fillStyle='#000'; ctx.fillRect(0,0,cvEl.width,cvEl.height);
  res.forEach((r,idx)=>{ const col=idx%2,row=(idx/2)|0; const ox=pad+col*(cellW+pad), oy=pad+row*(mh+22+pad); const s=cellW/r.w;
    drawResult(ctx,r,ox,oy,s);
    ctx.fillStyle=r.valid?'#9ae6b4':'#fca5a5'; ctx.font='11px monospace';
    ctx.fillText(r.n+' '+(r.valid?'OK':'REJ')+' a='+(r.metrics.areaFrac||0), ox, oy+Math.round(cellW*r.h/r.w)+15); });
  out.textContent=JSON.stringify(res.map(r=>({n:r.n,valid:r.valid,...r.metrics,reasons:r.reasons})),null,2);
  setStatus('done', '#10b981');
}
</script>
</body>
</html>
