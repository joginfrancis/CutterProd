<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrumiCam — Mobile Upload</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface-color: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-color: #3b82f6;
            --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            --accent-color: #10b981;
            --text-color: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--surface-color);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .logo {
            font-size: 32px;
            color: var(--primary-color);
            margin-bottom: 8px;
            display: inline-block;
            animation: pulse 2s infinite ease-in-out;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, #ffffff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .upload-area {
            border: 2px dashed rgba(59, 130, 246, 0.3);
            border-radius: 16px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            margin-bottom: 24px;
        }

        .upload-area:hover, .upload-area:active {
            border-color: var(--primary-color);
            background: rgba(59, 130, 246, 0.05);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }

        .upload-btn-label {
            display: inline-block;
            padding: 12px 24px;
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .upload-btn-label:active {
            transform: scale(0.98);
        }

        #fileInput {
            width: 0.1px;
            height: 0.1px;
            opacity: 0;
            overflow: hidden;
            position: absolute;
            z-index: -1;
        }

        .progress-container {
            display: none;
            margin-top: 16px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--primary-gradient);
            border-radius: 3px;
            transition: width 0.1s ease;
        }

        .progress-status {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-card {
            display: none;
            margin-top: 24px;
            padding: 16px;
            border-radius: 12px;
            text-align: left;
            font-size: 14px;
            border: 1px solid transparent;
            animation: fadeIn 0.4s ease;
        }

        .status-card.success {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .status-card.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .status-title {
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .preview-img {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 16px;
            border: 1px solid var(--border-color);
            display: none;
        }

        /* Lucide Integration */
        .lucide {
            width: 1.2em;
            height: 1.2em;
            stroke-width: 2px;
            vertical-align: middle;
            display: inline-block;
        }

        .logo .lucide {
            width: 2.2rem;
            height: 2.2rem;
            stroke-width: 2.2px;
        }

        .upload-icon .lucide {
            width: 3.5rem;
            height: 3.5rem;
            stroke-width: 1.5px;
            color: var(--primary-color);
        }

        .status-title .lucide {
            margin-right: 8px;
            vertical-align: -0.12em;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="logo"><i data-lucide="aperture"></i></span>
        <h1>UrumiCam</h1>
        <p>Method 2: Mobile Bed Capture. Snap a picture of the machine bed ensuring all four ArUco markers are clearly visible.</p>

        <div class="upload-area" id="uploadArea">
            <span class="upload-icon"><i data-lucide="camera"></i></span>
            <span class="upload-btn-label">Capture & Upload</span>
        </div>
        <input type="file" id="fileInput" accept="image/*">

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-status" id="progressStatus">Uploading: 0%</div>
        </div>

        <div class="status-card" id="statusCard">
            <div class="status-title" id="statusTitle">
                <span><i data-lucide="check-circle"></i></span> Upload Complete
            </div>
            <div id="statusMessage">File processed successfully.</div>
            <img class="preview-img" id="previewImg" src="" alt="Rectified Bed Preview">
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressStatus = document.getElementById('progressStatus');
        const statusCard = document.getElementById('statusCard');
        const statusTitle = document.getElementById('statusTitle');
        const statusMessage = document.getElementById('statusMessage');
        const previewImg = document.getElementById('previewImg');

        uploadArea.addEventListener('click', function() {
            fileInput.click();
        });

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Reset UI
            statusCard.className = 'status-card';
            statusCard.style.display = 'none';
            previewImg.style.display = 'none';
            progressContainer.style.display = 'block';
            progressFill.style.width = '0%';
            progressStatus.innerText = 'Preparing image...';

            const formData = new FormData();
            formData.append('image', file);

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/method2/upload', true);

            xhr.upload.onprogress = function(event) {
                if (event.lengthComputable) {
                    const percent = Math.round((event.loaded / event.total) * 100);
                    // Cap at 95% until server completes processing
                    const displayPercent = Math.min(95, percent);
                    progressFill.style.width = displayPercent + '%';
                    progressStatus.innerText = `Uploading: ${displayPercent}%`;
                }
            };

            xhr.onload = function() {
                progressFill.style.width = '100%';
                progressStatus.innerText = 'Processing on server...';

                if (xhr.status >= 200 && xhr.status < 300) {
                    try {
                        const response = JSON.parse(xhr.responseText);
                        if (response.success) {
                            showSuccess(response);
                        } else {
                            showError(response.message || 'Rectification failed. Ensure ArUco markers are visible.');
                        }
                    } catch(err) {
                        showError('Invalid server response.');
                    }
                } else {
                    showError(`Server error: ${xhr.status}`);
                }
            };

            xhr.onerror = function() {
                showError('Network error occurred.');
            };

            xhr.send(formData);
        });

        function showSuccess(data) {
            progressContainer.style.display = 'none';
            statusCard.className = 'status-card success';
            statusCard.style.display = 'block';
            statusTitle.innerHTML = '<span><i data-lucide="check-circle"></i></span> Rectification Success';
            lucide.createIcons();
            statusMessage.innerHTML = `
                Detected <strong>${data.frame_name}</strong> frame (${data.physical_width}x${data.physical_height} mm).<br>
                Scale: ${data.dpi} DPI (${data.dots_per_mm.toFixed(2)} px/mm).<br>
                Mean residual error: ${data.error_mm.toFixed(3)} mm.
            `;
            
            // Create a wrapper for the preview image to overlay the edges
            const wrapper = document.createElement('div');
            wrapper.style.position = 'relative';
            wrapper.style.display = 'inline-block';
            wrapper.style.maxWidth = '100%';
            wrapper.style.marginTop = '16px';
            
            const baseImg = document.createElement('img');
            baseImg.src = data.image_url;
            baseImg.style.display = 'block';
            baseImg.style.maxWidth = '100%';
            baseImg.style.borderRadius = '12px';
            baseImg.style.border = '1px solid rgba(255, 255, 255, 0.08)';
            
            wrapper.appendChild(baseImg);
            
            // Add Edge Overlay if provided
            if (data.edges_image_url) {
                const edgesImg = document.createElement('img');
                edgesImg.src = data.edges_image_url;
                edgesImg.style.position = 'absolute';
                edgesImg.style.top = '0';
                edgesImg.style.left = '0';
                edgesImg.style.width = '100%';
                edgesImg.style.height = '100%';
                edgesImg.style.borderRadius = '12px';
                wrapper.appendChild(edgesImg);
            }
            
            // Draw Auto-ROI if detected
            if (data.detected_roi) {
                const roiBox = document.createElement('div');
                roiBox.style.position = 'absolute';
                
                // Convert physical mm bounding box to relative percentages
                const leftPct = (data.detected_roi.x / data.physical_width) * 100;
                const topPct = (data.detected_roi.y / data.physical_height) * 100;
                const widthPct = (data.detected_roi.w / data.physical_width) * 100;
                const heightPct = (data.detected_roi.h / data.physical_height) * 100;
                
                roiBox.style.left = `${leftPct}%`;
                roiBox.style.top = `${topPct}%`;
                roiBox.style.width = `${widthPct}%`;
                roiBox.style.height = `${heightPct}%`;
                roiBox.style.border = '2px solid #10b981';
                roiBox.style.backgroundColor = 'rgba(16, 185, 129, 0.15)';
                roiBox.style.boxShadow = '0 0 15px rgba(16, 185, 129, 0.6)';
                roiBox.style.borderRadius = '2px';
                roiBox.style.pointerEvents = 'none';
                
                wrapper.appendChild(roiBox);
            }
            
            // Clear existing previews and append the rich wrapper
            const existingWrapper = statusCard.querySelector('div[style*="position: relative"]');
            if (existingWrapper) {
                existingWrapper.remove();
            }
            previewImg.style.display = 'none'; // hide the standard img
            statusCard.appendChild(wrapper);
        }

        function showError(message) {
            progressContainer.style.display = 'none';
            statusCard.className = 'status-card error';
            statusCard.style.display = 'block';
            statusTitle.innerHTML = '<span><i data-lucide="alert-triangle"></i></span> Rectification Failed';
            statusMessage.innerText = message;
            lucide.createIcons();
        }

        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
