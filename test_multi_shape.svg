<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- A rectangle (straight lines with sharp 90-degree corners) -->
  <rect x="10" y="10" width="50" height="50" rx="0" ry="0" fill="none" stroke="red" stroke-width="1" />
  
  <!-- A circle (continuous smooth curve) -->
  <circle cx="120" cy="50" r="30" fill="none" stroke="blue" stroke-width="1" />

  <!-- A path with alternating line and cubic Bezier curve -->
  <path d="M 10 120 L 60 120 C 80 100, 100 150, 120 120 L 170 120" fill="none" stroke="green" stroke-width="1" />
</svg>
